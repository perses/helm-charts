{{- if .Values.certManager.enable }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    labels:
        app.kubernetes.io/component: certificate
        app.kubernetes.io/created-by: perses-operator
        app.kubernetes.io/instance: serving-cert
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: certificate
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/part-of: perses-operator
    name: {{ include "perses-operator.resourceName" (dict "suffix" "serving-cert" "context" $) }}
    namespace: {{ .Release.Namespace }}
spec:
    dnsNames:
        - {{ include "perses-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}.{{ .Release.Namespace }}.svc
        - {{ include "perses-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}.{{ .Release.Namespace }}.svc.cluster.local
    issuerRef:
        kind: Issuer
        name: {{ include "perses-operator.resourceName" (dict "suffix" "selfsigned-issuer" "context" $) }}
    secretName: {{ include "perses-operator.resourceName" (dict "suffix" "webhook-server-cert" "context" $) }}
{{- end }}
