name: ci

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: perses/github-actions@v0.12.0
      - uses: ./.github/perses-ci/actions/setup_environment
        with:
          enable_go: true

      - name: setup helm
        uses: azure/setup-helm@v5

      - name: verify chart docs are up to date
        run: make update-helm-readme && make checkdocs

      - name: run helm validate
        run: make helm-validate

      - name: run helm unit tests
        run: make helm-unit-test
