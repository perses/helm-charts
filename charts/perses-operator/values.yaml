# -- String to partially override chart.fullname template (will maintain the release name)
# nameOverride: ""

# -- String to fully override chart.fullname template
# fullnameOverride: ""

# -- Configure the controller manager deployment
manager:
  # -- Number of replicas
  replicas: 1

  image:
    # -- Container image repository
    repository: docker.io/persesdev/perses-operator
    # -- Container image tag
    tag: v0.3.0
    # -- Image pull policy
    pullPolicy: IfNotPresent

  # -- Arguments passed to the manager container
  args:
    - --leader-elect

  # -- Environment variables for the manager container
  env: []

  # -- Image pull secrets
  imagePullSecrets: []

  # -- Pod-level security settings
  podSecurityContext: {}
    # fsGroup: 2000

  # -- Container-level security settings
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
        drop:
            - ALL

  # -- Resource limits and requests
  resources:
    limits:
        cpu: 500m
        memory: 128Mi
    requests:
        cpu: 10m
        memory: 64Mi

  # -- Manager pod affinity
  affinity:
    nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - amd64
                        - arm64
                        - ppc64le
                        - s390x
                    - key: kubernetes.io/os
                      operator: In
                      values:
                        - linux

  # -- Manager pod node selector
  nodeSelector: {}

  # -- Manager pod tolerations
  tolerations: []

# -- Kube RBAC Proxy sidecar configuration
kubeRbacProxy:
  image:
    # -- Kube RBAC Proxy image repository
    repository: gcr.io/kubebuilder/kube-rbac-proxy
    # -- Kube RBAC Proxy image tag
    tag: v0.13.1
  # -- Kube RBAC Proxy resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 5m
      memory: 64Mi
  # -- Kube RBAC Proxy container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# -- Helper RBAC roles for managing custom resources
rbacHelpers:
  # -- Install convenience admin/editor/viewer roles for CRDs
  enable: false

# -- Custom Resource Definitions
crd:
  # -- Install CRDs with the chart
  enable: true
  # -- Keep CRDs when uninstalling
  keep: true

# -- Controller metrics endpoint. Enable to expose /metrics endpoint with RBAC protection.
metrics:
  # -- Enable metrics endpoint
  enable: true
  # -- Metrics server port
  port: 8082

# -- Cert-manager integration for TLS certificates. Required for webhook and metrics endpoint certificates.
certManager:
  # -- Enable cert-manager integration
  enable: true

# -- Webhook server configuration
webhook:
  # -- Enable webhook server
  enable: true
  # -- Webhook server port
  port: 9443

# -- Prometheus ServiceMonitor for metrics scraping. Requires prometheus-operator to be installed in the cluster.
prometheus:
  # -- Enable ServiceMonitor creation
  enable: false

# -- Helm test framework configuration
testFramework:
  # -- Enable helm test resources
  enabled: true
  image:
    # -- Test image registry
    registry: ghcr.io
    # -- Test image repository
    repository: cloudoperators/greenhouse-extensions-integration-test
    # -- Test image tag
    tag: main
  # -- Test image pull policy
  imagePullPolicy: IfNotPresent
