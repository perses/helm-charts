suite: rbac resources
templates:
  - templates/rbac/controller-manager.yaml
  - templates/rbac/manager-role.yaml
  - templates/rbac/manager-rolebinding.yaml
  - templates/rbac/leader-election-role.yaml
  - templates/rbac/leader-election-rolebinding.yaml
  - templates/rbac/proxy-role.yaml
  - templates/rbac/proxy-rolebinding.yaml
  - templates/rbac/metrics-reader.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should render a ServiceAccount
    template: templates/rbac/controller-manager.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1

  - it: should set ServiceAccount name correctly
    template: templates/rbac/controller-manager.yaml
    asserts:
      - equal:
          path: metadata.name
          value: test-release-perses-operator-controller-manager

  - it: should render manager ClusterRole
    template: templates/rbac/manager-role.yaml
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: test-release-perses-operator-manager-role

  - it: should render manager ClusterRoleBinding
    template: templates/rbac/manager-rolebinding.yaml
    asserts:
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: test-release-perses-operator-manager-rolebinding

  - it: should render leader election Role
    template: templates/rbac/leader-election-role.yaml
    asserts:
      - containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1

  - it: should bind manager ClusterRoleBinding to the ServiceAccount
    template: templates/rbac/manager-rolebinding.yaml
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: test-release-perses-operator-controller-manager
      - equal:
          path: subjects[0].namespace
          value: test-ns

  - it: should render proxy ClusterRole with correct name
    template: templates/rbac/proxy-role.yaml
    asserts:
      - equal:
          path: metadata.name
          value: test-release-perses-operator-proxy-role

  - it: should bind proxy ClusterRoleBinding to the ServiceAccount
    template: templates/rbac/proxy-rolebinding.yaml
    asserts:
      - equal:
          path: roleRef.name
          value: test-release-perses-operator-proxy-role
      - equal:
          path: subjects[0].name
          value: test-release-perses-operator-controller-manager

  - it: should render metrics-reader ClusterRole when metrics enabled
    template: templates/rbac/metrics-reader.yaml
    set:
      metrics.enable: true
    asserts:
      - equal:
          path: metadata.name
          value: test-release-perses-operator-metrics-reader

  - it: should not render metrics-reader ClusterRole when metrics disabled
    template: templates/rbac/metrics-reader.yaml
    set:
      metrics.enable: false
    asserts:
      - hasDocuments:
          count: 0
