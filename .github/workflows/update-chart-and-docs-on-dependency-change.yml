name: update-chart-and-docs-on-dependency-change

on:
  pull_request:
    types: [opened, labeled, synchronize]

jobs:
  bump-chart-version:
    name: Bump Chart Version
    if: contains(github.event.pull_request.labels.*.name, 'dependencies')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Install yq for YAML processing
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Process Chart version update
        id: version-update
        run: |
          for chart_yaml in charts/*/Chart.yaml; do
            chart_dir=$(dirname "$chart_yaml")
            chart_name=$(basename "$chart_dir")

            if git diff HEAD^ HEAD -- "$chart_yaml" | grep -q '^[+-].*appVersion:'; then
              echo "appVersion change detected in $chart_name - updating Chart version"

              current_version=$(yq e '.version' "$chart_yaml")
              echo "Current Chart version for $chart_name: $current_version"

              IFS='.' read -r major minor patch <<< "$current_version"
              new_version="${major}.$((minor + 1)).0"
              echo "New Chart version will be: $new_version"

              yq e ".version = \"$new_version\"" -i "$chart_yaml"
              echo "Successfully updated $chart_yaml version"
            else
              echo "No appVersion change detected in $chart_name - skipping"
            fi
          done

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add charts/*/Chart.yaml
          git commit -m "chore: bump chart version(s) due to appVersion change" || echo "No changes to commit"
          git push origin "${{ github.event.pull_request.head.ref }}"

  update-docs:
    name: Update Docs and Commit
    needs: [bump-chart-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - uses: perses/github-actions@v0.11.0
      - uses: ./.github/perses-ci/actions/setup_environment
        with:
          enable_go: true

      - name: Install mdox documentation tool
        run: go install github.com/bwplotka/mdox@latest

      - name: Generate documentation and assets
        run: make update-helm-readme

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [[ $(git status --porcelain) ]]; then
            git add charts/ '*.md'
            git commit -m "chore: update generated docs"
            git push origin "${{ github.event.pull_request.head.ref }}"
          else
            echo "No changes to commit"
          fi
