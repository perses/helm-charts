name: update-docs-on-dependency-change

on:
  pull_request:
    types: [opened, labeled, synchronize]

jobs:
  update-docs:
    name: Update Docs and Commit
    if: contains(github.event.pull_request.labels.*.name, 'dependencies')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - uses: perses/github-actions@v0.11.0
      - uses: ./.github/perses-ci/actions/setup_environment
        with:
          enable_go: true

      - name: Install mdox documentation tool
        run: go install github.com/bwplotka/mdox@latest

      - name: Generate documentation and assets
        run: make update-helm-readme

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [[ $(git status --porcelain) ]]; then
            git add charts/ '*.md'
            git commit -m "chore: update generated docs"
            git push origin "${{ github.event.pull_request.head.ref }}"
          else
            echo "No changes to commit"
          fi
