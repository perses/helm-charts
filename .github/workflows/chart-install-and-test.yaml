name: chart install and test

on:
  pull_request:
    paths:
      - "charts/**"
    branches:
      - main

jobs:
  helm-lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: load env
        run: cat .github/env >> $GITHUB_ENV

      - name: setup helm lint requirements
        uses: ./.github/actions/setup_helmlint
        with:
          create-kind-cluster: "true"
          kind-version: ${{ env.kind-version }}
          kind-image: ${{ env.kind-image }}

      # Ensure perses-operator CRDs match upstream for the appVersion in Chart.yaml
      - name: verify CRDs are in sync with upstream
        run: |
          make sync-crds
          git diff --exit-code -- charts/perses-operator/templates/crd/

      # Test perses-operator without cert-manager (certManager.enable=false)
      - name: test perses-operator without cert-manager
        run: |
          helm install perses-operator-no-cm charts/perses-operator \
            --set certManager.enable=false --wait --timeout 120s
          helm test perses-operator-no-cm
          helm uninstall perses-operator-no-cm --wait
          kubectl delete crd -l app.kubernetes.io/managed-by=Helm --ignore-not-found

      # perses-operator chart requires cert-manager for webhook and metrics TLS certificates
      - name: install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/${{ env.cert-manager-version }}/cert-manager.yaml
          kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=120s

      - name: run chart-testing (install)
        run: ct install --all
